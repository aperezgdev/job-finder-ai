services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-finder-app
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/jobs.sqlite
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    volumes:
      - job_finder_data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: job-finder-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  job_finder_data:
  redis_data:
